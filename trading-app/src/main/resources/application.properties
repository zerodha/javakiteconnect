# Spring Boot Application Properties
spring.application.name=kite-connect-trading-app
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.example.kiteconnectapp=DEBUG

# Kite Connect API Configuration
# Get these from https://kite.zerodha.com/account/app/tokens
kite.api.key=${KITE_API_KEY:YOUR_API_KEY_HERE}
kite.api.secret=${KITE_API_SECRET:YOUR_API_SECRET_HERE}
kite.login.url=https://kite.zerodha.com/connect/login

# Session Configuration
spring.session.store-type=none
server.servlet.session.timeout=30m

# Disable basic auth for now (can be configured later)
spring.security.user.name=user
spring.security.user.password=password

# Jackson Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# H2 Database (bot persistence)
spring.datasource.url=jdbc:h2:file:./data/trading-app-db;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
